[package]
name = "light-pingora"
version.workspace = true
edition.workspace = true
license = "Apache-2.0"

[dependencies]
light-client = { path = "../../crates/light-client" }
light-runtime = { path = "../../crates/light-runtime" }
light-rule = { path = "../../crates/light-rule" }
async-trait = { workspace = true }
base64 = "0.22"
hmac = { workspace = true }
hex = { workspace = true }
jsonwebtoken = "9.3"
pbkdf2 = "0.12"
pingora = { version = "0.8.0", features = ["proxy", "rustls"] }
rand = "0.8"
regex = "1"
reqwest = { workspace = true }
ring = "0.17"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
rustls-pemfile = "2.2"
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sha1 = "0.10"
sha2 = { workspace = true }
sqlx = { version = "0.8", features = ["chrono", "json", "postgres", "runtime-tokio-rustls", "uuid"] }
subtle = "2.6"
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = "3"
