[package]
name = "workflow-builder"
version = "1.0.0"
edition = "2021"
authors = ["stevehu@gmail.com"]
description = "Contains services used to build AgenticWorkflow workflow definitions programatically"
homepage = "https://agentic-workflow.org"
repository = "https://github.com/agentic-workflow/sdk-rust"
documentation = "https://github.com/agentic-workflow/agentic-workflow-doc"
license = "Apache-2.0"
keywords = ["agentic-workflow", "sdk", "builders"]
categories = ["config", "parsing", "data-structures", "api-bindings"]

[dependencies]
workflow-core = { path = "../workflow-core", version = "1.0.0" }
serde_json = "1.0" 
serde_yaml = "0.9"