apiVersion: v1
kind: ServiceAccount
metadata:
  name: light-deployer
  namespace: light-deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: light-deployer
  namespace: light-deployer
rules:
  - apiGroups: ["", "apps", "networking.k8s.io"]
    resources: ["deployments", "services", "ingresses", "configmaps", "secrets", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: light-deployer
  namespace: light-deployer
subjects:
  - kind: ServiceAccount
    name: light-deployer
    namespace: light-deployer
roleRef:
  kind: Role
  name: light-deployer
  apiGroup: rbac.authorization.k8s.io
