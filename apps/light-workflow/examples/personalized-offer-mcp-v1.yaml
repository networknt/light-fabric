document:
  dsl: "1.0.3"
  namespace: light-demo
  name: personalized-offer-mcp-v1
  version: "1.0.0"
  title: Personalized Offer via MCP Router
  summary: Calls the demo customer profile and offer decision APIs through light-gateway MCP tools and returns a normalized offer decision.
  tags:
    demo: skill-workflow-orchestration
    executionPath: mcp
input:
  schema:
    format: json
    document:
      type: object
      required:
        - customerId
        - channel
      properties:
        customerId:
          type: string
          example: CUST-1001
        channel:
          type: string
          default: portal
          example: portal
output:
  schema:
    format: json
    document:
      type: object
      required:
        - status
        - customerId
      properties:
        status:
          type: string
          enum:
            - APPROVED
            - NO_CONSENT
            - NO_ELIGIBLE_OFFER
        customerId:
          type: string
        selectedOfferId:
          type: string
        decisionId:
          type: string
        reason:
          type: string
use:
  mcpSessions:
    gateway:
      server:
        endpoint:
          uri: https://light-gateway:8443/mcp
        transport: http
      reuse: true
do:
  - loadProfile:
      call: mcp
      with:
        session: gateway
        tool: getCustomerProfile
        arguments:
          customerId: "${ .customerId }"
      export:
        as:
          profile: .output.structuredContent
  - loadPreferences:
      call: mcp
      with:
        session: gateway
        tool: getCustomerPreferences
        arguments:
          customerId: "${ .customerId }"
          channel: "${ .channel }"
      export:
        as:
          preferences: .output.structuredContent
  - checkConsent:
      switch:
        - noConsent:
            when: "${ .preferences.consent == false }"
            then: noConsentResult
        - default:
            then: searchOffers
  - noConsentResult:
      set:
        status: NO_CONSENT
        customerId: "${ .customerId }"
        reason: Customer has not consented to personalized offers.
      end: true
  - searchOffers:
      call: mcp
      with:
        session: gateway
        tool: searchOffers
        arguments:
          segment: "${ .profile.segment }"
          state: "${ .profile.state }"
          category: travel
      export:
        as:
          offers: .output.structuredContent
  - evaluateEligibility:
      switch:
        - premiumOntario:
            when: "${ .profile.segment == premium }"
            then: selectOffer
        - default:
            then: noEligibleOfferResult
  - noEligibleOfferResult:
      set:
        status: NO_ELIGIBLE_OFFER
        customerId: "${ .customerId }"
        reason: No active offer matches the customer profile and preferences.
      end: true
  - selectOffer:
      set:
        offerId: OFFER-TRAVEL-01
        reason: Selected highest-priority travel offer for the premium Ontario demo segment.
      export:
        as:
          selectedOffer: .output
  - recordDecision:
      call: mcp
      with:
        session: gateway
        tool: recordOfferDecision
        arguments:
          customerId: "${ .customerId }"
          offerId: "${ .selectedOffer.offerId }"
          channel: "${ .channel }"
          source: workflow-mcp
          reason: "${ .selectedOffer.reason }"
          idempotencyKey: "personalized-offer-mcp-v1:${ .customerId }:${ .selectedOffer.offerId }"
      export:
        as:
          decision: .output.structuredContent
  - finish:
      set:
        status: APPROVED
        customerId: "${ .customerId }"
        selectedOfferId: "${ .decision.offerId }"
        decisionId: "${ .decision.decisionId }"
      end: true
