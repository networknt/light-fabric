# Local LLM data plane. It is inert unless both this flag and the `llm`
# handler are enabled. The endpoints and credentials below are development
# fixtures and must be replaced for a production deployment.
# The handler path must execute, in order:
# correlation -> unified-security -> limit -> access-control -> llm
enabled: ${llm-router.enabled:false}
pathPrefix: ${llm-router.pathPrefix:/v1}
maxRequestBodyBytes: ${llm-router.maxRequestBodyBytes:1048576}
maxJsonDepth: ${llm-router.maxJsonDepth:64}
maxReplayBytes: ${llm-router.maxReplayBytes:1048576}
requestTimeoutMs: ${llm-router.requestTimeoutMs:30000}
globalConcurrency: ${llm-router.globalConcurrency:256}
globalStreamConcurrency: ${llm-router.globalStreamConcurrency:64}
streamChannelCapacity: ${llm-router.streamChannelCapacity:8}
streamWriteTimeoutMs: ${llm-router.streamWriteTimeoutMs:5000}
streamSetupTimeoutMs: ${llm-router.streamSetupTimeoutMs:10000}
streamIdleTimeoutMs: ${llm-router.streamIdleTimeoutMs:15000}
streamMinimumDrainBytesPerSecond: ${llm-router.streamMinimumDrainBytesPerSecond:128}
streamDrainGraceMs: ${llm-router.streamDrainGraceMs:1000}
developmentFixtures: ${llm-router.developmentFixtures:false}

# OpenAI-only request fields may be allowlisted here. Mixed-format aliases use
# strictest-wins parsing: adding an Anthropic fallback causes these extensions
# to be rejected for the entire alias so every eligible fallback is encodable.
# The compiler emits a warning when that compatibility narrowing is present.
openaiExtensionAllowlist: []

# Production-only config-server `/files` projection. When enabled, startup
# fails closed until a valid full root is available in config-cache. Every
# replica writes its own acknowledgement; credentialEnvironment maps opaque
# references to environment-variable names, never values.
productionProjection:
  enabled: ${llm-router.productionProjection.enabled:false}
  rootDirectory: ${llm-router.productionProjection.rootDirectory:config-cache/llm-projection}
  checkpointPath: ${llm-router.productionProjection.checkpointPath:data/llm-projection/checkpoint.json}
  acknowledgementDirectory: ${llm-router.productionProjection.acknowledgementDirectory:data/llm-projection/acknowledgements}
  gatewayInstance: ${llm-router.productionProjection.gatewayInstance:gateway-local}
  pollIntervalMs: ${llm-router.productionProjection.pollIntervalMs:1000}
  maxArtifactBytes: ${llm-router.productionProjection.maxArtifactBytes:4194304}
  # Production defaults to evidence captured from a real provider endpoint.
  # synthetic_spec_derived is accepted only when developmentFixtures=true.
  requiredConformanceProvenance: ${llm-router.productionProjection.requiredConformanceProvenance:captured_sanitized}
  credentialEnvironment: {}

# Production projection uses the bounded single-writer WAL. `required` aliases
# map to bounded-async; `local_durable` aliases additionally require
# persistentVolume=true and wait for attempt-start fdatasync before dispatch.
# Persistent network filesystems are not automatically equivalent: operators
# must verify that the mounted filesystem preserves flock exclusion, fdatasync
# durability, atomic rename, and crash recovery semantics before enabling
# local_durable. NFS or an unverified network volume must not be declared safe
# merely because it survives pod replacement.
# auditRuntime and its database credential rotate only through a gateway
# restart so two reload generations can never own the same WAL concurrently.
auditRuntime:
  directory: ${llm-router.auditRuntime.directory:data/llm-audit}
  gatewayInstance: ${llm-router.auditRuntime.gatewayInstance:gateway-local}
  hostId: ${llm-router.auditRuntime.hostId:host-local}
  maxRecordBytes: ${llm-router.auditRuntime.maxRecordBytes:4096}
  maxSegmentBytes: ${llm-router.auditRuntime.maxSegmentBytes:67108864}
  maxSpoolBytes: ${llm-router.auditRuntime.maxSpoolBytes:1073741824}
  queueRecords: ${llm-router.auditRuntime.queueRecords:8192}
  batchRecords: ${llm-router.auditRuntime.batchRecords:64}
  batchBytes: ${llm-router.auditRuntime.batchBytes:262144}
  commitDelayMs: ${llm-router.auditRuntime.commitDelayMs:5}
  terminalCommitBeforeResponse: ${llm-router.auditRuntime.terminalCommitBeforeResponse:false}
  persistentVolume: ${llm-router.auditRuntime.persistentVolume:false}
  # Set sinkDatabaseUrlEnv to the name (not value) of an environment variable
  # holding the separately credentialed dedicated-audit PostgreSQL URL.
  # sinkDatabaseUrlEnv: LIGHT_GATEWAY_LLM_AUDIT_DATABASE_URL
  sinkBatchRecords: ${llm-router.auditRuntime.sinkBatchRecords:256}
  sinkBatchBytes: ${llm-router.auditRuntime.sinkBatchBytes:1048576}
  sinkPollMs: ${llm-router.auditRuntime.sinkPollMs:100}
  sinkRetryMaxMs: ${llm-router.auditRuntime.sinkRetryMaxMs:10000}

providers:
  openai-local:
    format: openai
    baseUrl: ${llm-router.openaiBaseUrl:http://127.0.0.1:18081/v1}
    secretRef: env:LIGHT_GATEWAY_LLM_OPENAI_KEY
    quotaGroupId: openai-local
  anthropic-local:
    format: anthropic
    baseUrl: ${llm-router.anthropicBaseUrl:http://127.0.0.1:18082/v1}
    secretRef: env:LIGHT_GATEWAY_LLM_ANTHROPIC_KEY
    quotaGroupId: anthropic-local

deployments:
  # These compact capability flags are development fixtures only. Production
  # projection resources must carry a complete, current conformanceResult whose
  # canonical digest equals conformanceDigest.
  openai-primary:
    provider: openai-local
    model: gpt-local
    concurrency: 32
    inputMicrosPerMillion: 1000000
    outputMicrosPerMillion: 2000000
    conformanceDigest: b8a824ffc02eeb85eb2f27bf0d95cac133db24b9968f025bca647e7205ff8661
    text: true
    images: true
    tools: true
    structuredJson: true
    # Set only from the model/deployment preservation corpus. Zero makes this
    # deployment ineligible for every reversible-PII alias.
    piiPlaceholderPreservationPercent: 0
  anthropic-fallback:
    provider: anthropic-local
    model: claude-local
    concurrency: 32
    inputMicrosPerMillion: 1000000
    outputMicrosPerMillion: 2000000
    conformanceDigest: 42fda39c867639ee97895ede7b18cb0526797e84eb5a63c4615074ee39ab0316
    text: true
    images: true
    tools: true
    structuredJson: false
    piiPlaceholderPreservationPercent: 0

aliases:
  light-default:
    deployments: [openai-primary, anthropic-fallback]
    maxAttempts: 2
    concurrency: 64
    maxInputTokens: 32768
    maxOutputTokens: 4096
    maxCostMicros: 1000000
    audit: required
    # Post-MVP and fail-closed by default. Request scope never constructs or
    # calls a vault. This LLM contract does not reuse pii-tokenization.yml.
    # Session/host scopes remain rejected until their independently
    # credentialed vault identity passes functional, security, durability, and
    # PERF-4 promotion.
    pii:
      enabled: false
      scope: request
      unresolved: leave_masked
      kinds: [email, us_ssn, phone]
      maxPlaceholders: 128
      maxValueBytes: 4096
      detectorVersion: local-regex-v1
      tokenFormatVersion: v1
      minimumPlaceholderPreservationPercent: 100
  legacy-agent-internal:
    deployments: [openai-primary]
    maxAttempts: 1
    concurrency: 8
    internal: true
    boundPrincipal: test-agent
    audit: required
