apiVersion: v1
kind: Service
metadata:
  name: ${name:ai-microgateway-rust}
  namespace: ${namespace:light-gateway}
  labels:
    app.kubernetes.io/name: ${name:ai-microgateway-rust}
    app.kubernetes.io/component: micro-gateway
    app.kubernetes.io/part-of: lightapi
spec:
  type: ${service.type:ClusterIP}
  selector:
    app.kubernetes.io/name: ${name:ai-microgateway-rust}
  ports:
    - name: http
      port: ${service.httpPort:8080}
      targetPort: http
      protocol: TCP
    - name: https
      port: ${service.httpsPort:8443}
      targetPort: https
      protocol: TCP
