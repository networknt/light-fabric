version: 1
runnerId: local-runner
enrollmentId: local-runner-enrollment
hostId: 00000000-0000-0000-0000-000000000000
controllerUrl: ws://127.0.0.1:8438/ws/runner
jwtFile: /run/secrets/light-workflow-runner.jwt
dataDirectory: /var/lib/light-workflow-runner
healthAddress: 127.0.0.1:9444
maximumConcurrency: 1
heartbeatIntervalMs: 5000
reconnectMaximumMs: 30000
shutdownGraceMs: 30000
stagingMaximumBytes: 104857600
backend:
  compatibilityDigest: sha256:replace-with-operator-approved-mock-profile
  availableSlots: 1
  behavior:
    durationMs: 10
    stdout: "mock execution completed\n"
    stderr: ""
    exitCode: 0
    outcome: success
    loseFirstResponse: false
    cleanupFails: false
allowedCommandTemplateDigests:
  - sha256:replace-with-canonical-command-template-digest

# Optional and disabled when absent. Enable only in an admitted agent-runner
# pool whose immutable image contains the reviewed binary at this fixed path.
# The worker command template digest must also appear in the allowlist above.
# agentWorker:
#   originServiceId: light-agent
#   executable: /usr/local/bin/light-agent-worker
#   binaryDigest: sha256:replace-with-exact-worker-binary-digest
#   capabilityDigest: sha256:replace-with-canonical-worker-capability-digest
