<!DOCTYPE html>
<html>

<head>
    <title>Light Agent Chat</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        #chat-log {
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 5px;
        }

        .user {
            color: blue;
        }

        .assistant {
            color: green;
        }

        .system {
            color: gray;
            font-style: italic;
        }

        .error {
            color: red;
        }

        #controls {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>Light Agent Chat</h1>

    <div id="controls">
        <button onclick="connect()" id="connectBtn">Connect</button>
        <button onclick="disconnect()" disabled id="disconnectBtn">Disconnect</button>
    </div>

    <div id="chat-log"></div>

    <div id="input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." style="width: 70%;" disabled>
        <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    </div>

    <script>
        let ws;
        const chatLog = document.getElementById('chat-log');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        let currentSessionId = sessionStorage.getItem('agentSessionId');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            // Use window.location.host to connect to the current server
            const url = new URL(`${protocol}//${window.location.host}/chat`);
            if (currentSessionId) {
                url.searchParams.set('sessionId', currentSessionId);
            }
            console.log("Connecting to:", url.toString());
            ws = new WebSocket(url.toString());

            ws.onopen = () => {
                log('System', 'Connected to Agent.');
                messageInput.disabled = false;
                sendBtn.disabled = false;
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            };

            ws.onmessage = (event) => {
                const data = event.data;
                console.log("Received:", data);

                try {
                    const msg = JSON.parse(data);
                    if (msg.type === 'session') {
                        currentSessionId = msg.session_id;
                        sessionStorage.setItem('agentSessionId', currentSessionId);
                        log('System', 'Session ID: ' + currentSessionId);
                    } else if (msg.type === 'text') {
                        log('Assistant', msg.text);
                    } else if (msg.type === 'error') {
                        log('Error', msg.message);
                    }
                } catch (e) {
                    console.error("Parse error:", e);
                    log('System', 'Raw message: ' + data);
                }
            };

            ws.onclose = () => {
                log('System', 'Disconnected.');
                messageInput.disabled = true;
                sendBtn.disabled = true;
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            };

            ws.onerror = (error) => {
                log('Error', 'WebSocket error encountered.');
                console.error(error);
            };
        }

        function disconnect() {
            if (ws) ws.close();
        }

        function sendMessage() {
            const text = messageInput.value;
            if (text && ws) {
                log('User', text);
                const payload = { text: text };
                ws.send(JSON.stringify(payload));
                messageInput.value = '';
            }
        }

        function log(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role.toLowerCase();
            div.innerHTML = `<strong>${role}:</strong> `;
            div.appendChild(document.createTextNode(text));
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
            return div;
        }

        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>

</html>
