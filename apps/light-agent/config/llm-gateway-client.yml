# agent profile/turn binding and sends it in the standard OpenAI `model` field.
name: light-gateway
baseUrl: ${llm-gateway-client.baseUrl:https://light-gateway:8443/v1}
apiKey: ${llm-gateway-client.apiKey:}
maxTokens: ${llm-gateway-client.maxTokens:}
